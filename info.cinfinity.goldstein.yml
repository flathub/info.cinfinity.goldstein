id: info.cinfinity.goldstein
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: golds-gtk

rename-icon: goldstein

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=network

modules:
  - name: stdconfig
    buildsystem: autotools
    no-autogen: true
    make-install-args:
      - PREFIX=/app
    build-options:
      cflags: -fPIC
    sources:
      - type: archive
        url: https://cinfinity.info/src/stdconfig_0.3.4.tar.xz
        sha256: f26a5148dbb2cd697b245504c191890c8a1216d6f956a362ecc44ccde69a852d

  - name: goldstein
    buildsystem: autotools
    no-autogen: true
    build-options:
      cflags: -fPIC -Wno-unused-result
    make-install-args:
      - PREFIX=/app
    sources:
      - type: archive
        url: https://cinfinity.info/src/goldstein_0.4.3.tar.xz
        sha256: 55b83a7cea9143a44b7000cee285acaf193eaf718574bc8e5d9e591deb53958a



